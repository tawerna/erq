---
layout: default
---
<article class="entry" itemscope itemtype="http://schema.org/BlogPosting">
    <div class="content">
        <h2 class="title">{{ page.title | escape }} </h2>
        <div class="post">
            {{ content }}
        </div>
    </div>
    <aside class="info">
        <i class="fa fa-fw fa-calendar"></i> {{ page.date | date: "%Y-%m-%d" }} 
        <i class="fa fa-fw fa-clock-o"></i> {{ page.date | date: "%k:%M" }}
    </aside>
</article>
